<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLONTERS | The First Music IoT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #080808;
            /* พื้นหลังสร้างเอฟเฟกต์ไฟสปอตไลต์สาดลงมาจากด้านบน แบบโปสเตอร์ Whiplash */
            background: radial-gradient(circle at 50% -20%, #2a2a2a 0%, #050505 70%);
            color: #dcd8cc; /* สีขาวอมเหลืองหม่นๆ เหมือนกระดาษเก่า */
            font-family: 'Lora', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- กล่อง Login --- */
        .auth-container {
            background: transparent;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        h1.logo {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 6px;
            color: #f0ece1;
            margin-bottom: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 0.9rem;
            font-style: italic;
            color: #7a756b;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .toggle-box {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
        }

        .toggle-btn {
            flex: 1;
            background: none;
            border: none;
            color: #555;
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-btn.active {
            color: #dcd8cc;
            border-bottom: 1px solid #dcd8cc;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #444;
            padding: 10px 5px;
            color: #dcd8cc;
            font-size: 1rem;
            font-family: 'Lora', serif;
            transition: 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-bottom-color: #888;
        }

        .input-group input::placeholder { color: #444; font-style: italic; }

        .submit-btn {
            background-color: transparent;
            color: #dcd8cc;
            border: 1px solid #555;
            padding: 15px;
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.4s;
        }

        .submit-btn:hover {
            background-color: #dcd8cc;
            color: #000;
            border-color: #dcd8cc;
        }

        .hidden { display: none !important; }

        /* --- หน้า Dashboard เปล่าๆ (หลัง Login) --- */
        .dashboard-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            padding: 50px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard-container.visible {
            opacity: 1;
            pointer-events: all;
        }

        .dash-header {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: #555;
            letter-spacing: 4px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            width: 100%;
            max-width: 1000px;
            text-align: left;
        }

        .dash-content {
            margin-top: 40px;
            color: #555;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="auth-container" id="auth-section">
        <h1 class="logo">FLONTERS</h1>
        <p class="subtitle">The first music IOT</p>

        <div class="toggle-box">
            <button class="toggle-btn active" id="btn-login" onclick="switchForm('login')">LOGIN</button>
            <button class="toggle-btn" id="btn-signup" onclick="switchForm('signup')">SIGN UP</button>
        </div>

        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">ENTER</button>
        </form>

        <form id="form-signup" class="hidden" onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" placeholder="Conductor Name" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">REGISTER</button>
        </form>
    </div>

    <div class="dashboard-container" id="dash-section">
        <div class="dash-header">FLONTERS STUDIO</div>
        <div class="dash-content">
            <p>Ready to compose... (หน้าเปล่ารอใส่ระบบเขียนโน้ต)</p>
        </div>
    </div>

    <script>
        // สลับหน้า Login / Sign Up
        function switchForm(type) {
            const formLogin = document.getElementById('form-login');
            const formSignup = document.getElementById('form-signup');
            const btnLogin = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');

            if (type === 'login') {
                formLogin.classList.remove('hidden');
                formSignup.classList.add('hidden');
                btnLogin.classList.add('active');
                btnSignup.classList.remove('active');
            } else {
                formLogin.classList.add('hidden');
                formSignup.classList.remove('hidden');
                btnLogin.classList.remove('active');
                btnSignup.classList.add('active');
            }
        }

        // ฟังก์ชันจำลองการ Login
        function handleLogin(event) {
            event.preventDefault(); // ป้องกันไม่ให้เว็บโหลดใหม่ตอนกด Submit
            
            const authSection = document.getElementById('auth-section');
            const dashSection = document.getElementById('dash-section');

            // ทำให้กล่อง Login ค่อยๆ จางหายไป
            authSection.style.opacity = '0';
            authSection.style.transform = 'scale(0.95)';
            
            // รอแป๊บนึงแล้วค่อยโชว์หน้า Dashboard
            setTimeout(() => {
                authSection.classList.add('hidden');
                dashSection.classList.add('visible');
            }, 800);
        }
    </script>
</body>
</html>
