<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLONTERS | The First Music IoT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lora:ital,wght@0,400;0,700;1,400&family=Courier+Prime&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/vexflow/build/cjs/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #080808; color: #dcd8cc; font-family: 'Lora', serif; height: 100vh; overflow: hidden; position: relative; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        /* ================= Auth Section ================= */
        #auth-section { background: radial-gradient(circle at 50% -20%, #2a2a2a 0%, #050505 70%); height: 100vh; display: flex; justify-content: center; align-items: center; transition: opacity 0.8s ease, transform 0.8s ease; position: absolute; width: 100%; z-index: 1000; }
        .auth-box { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
        h1.logo { font-family: 'Cinzel', serif; font-size: 3.5rem; font-weight: 800; letter-spacing: 6px; color: #f0ece1; margin-bottom: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .subtitle { font-size: 0.9rem; font-style: italic; color: #7a756b; letter-spacing: 2px; margin-bottom: 30px; }
        .toggle-box { display: flex; margin-bottom: 25px; border-bottom: 1px solid #222; }
        .toggle-btn { flex: 1; background: none; border: none; color: #555; font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; letter-spacing: 2px; padding: 10px 0; cursor: pointer; transition: 0.3s; }
        .toggle-btn.active { color: #dcd8cc; border-bottom: 1px solid #dcd8cc; }
        form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        .input-group input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #444; padding: 10px 5px; color: #dcd8cc; font-size: 1rem; font-family: 'Lora', serif; transition: 0.3s; }
        .input-group input:focus { outline: none; border-bottom-color: #888; }
        .submit-btn { background-color: transparent; color: #dcd8cc; border: 1px solid #555; padding: 15px; font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 600; letter-spacing: 2px; cursor: pointer; margin-top: 5px; transition: all 0.4s; }
        .submit-btn:hover { background-color: #dcd8cc; color: #000; border-color: #dcd8cc; }
        .error-msg { color: #9e2a2b; font-size: 0.85rem; font-style: italic; min-height: 20px; text-align: center; }
        .hidden { display: none !important; }

        /* ================= Dashboard Section ================= */
        #dash-section { opacity: 0; pointer-events: none; height: 100vh; display: flex; flex-direction: column; background-color: #050505; transition: opacity 1s ease; position: absolute; width: 100%; z-index: 5; }
        .top-nav { height: 70px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: #080808; flex-shrink: 0; }
        .nav-logo { font-family: 'Cinzel', serif; font-size: 1.5rem; letter-spacing: 3px; }
        .user-profile-container { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; background-color: #1a1a1a; border: 1px solid #444; display: flex; justify-content: center; align-items: center; background-size: cover; background-position: center; }

        .workspace { display: flex; flex: 1; overflow: hidden; position: relative;}
        .panel-left { width: 220px; background: #0a0a0a; display: flex; flex-direction: column; flex-shrink: 0; }
        .panel-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 2px; color: #555; padding: 12px 20px; border-bottom: 1px solid #1a1a1a; background: #080808; text-transform: uppercase; }
        
        /* ================= Editor & Composition ================= */
        .panel-editor-wrapper { flex: 1; display: flex; flex-direction: column; background: #f4ecd8; overflow: hidden; }
        .editor-header { border-bottom: 1px solid #d4c8b2; background: #e8dcc4; color: #333; font-weight: bold; flex-shrink: 0; }
        .panel-editor-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start; color: #111; }

        .file-list { list-style: none; padding: 0 10px 10px 10px; color: #888; font-size: 0.85rem; overflow-y: auto; flex: 1; }
        .file-list li { padding: 10px 8px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #222; display: flex; align-items: center; }
        .file-list li:hover { background-color: #1a1a1a; color: #dcd8cc; }
        .file-icon { color: #555; margin-right: 8px; }
        .file-name { flex: 1; }
        
        .btn-new-score { width: 90%; background: transparent; border: 1px solid #444; color: #777; padding: 8px 0; margin: 15px auto; display: block; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; border-radius: 4px; transition: 0.3s; }
        .btn-new-score:hover { color: #dcd8cc; border-color: #dcd8cc; }
        .btn-new-score:disabled { opacity: 0.3; cursor: not-allowed; }

        .new-file-group { display: flex; flex-direction: column; gap: 5px; width: 100%; padding: 5px; }
        .new-file-input, .new-inst-input { width: 100%; background: #111; border: 1px solid #555; color: #dcd8cc; padding: 4px 6px; font-family: 'Lora', serif; font-size: 0.85rem; border-radius: 3px; }

        .placeholder-text { color: #4a4235; font-style: italic; text-align: center; font-size: 1.2rem; margin-top: 15%; }
        .iot-terminal { font-family: 'Courier Prime', monospace; padding: 15px 20px; color: #666; font-size: 0.8rem; overflow-y: auto; height: 180px; background: #050505; border-top: 1px solid #1a1a1a; }
        
        /* Composition UI */
        .sheet-music-container { width: 100%; max-width: 800px; color: #000; }
        .sheet-title { font-family: 'Times New Roman', serif; font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
        .sheet-meta { display: flex; justify-content: space-between; border-bottom: 1px solid #000; padding-bottom: 5px; margin-bottom: 20px; font-family: 'Times New Roman', serif; }
        .sheet-actions { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .action-btn { background: transparent; border: 1px solid #000; padding: 5px 15px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 0.8rem; }
        .action-btn:hover { background: #000; color: #fff; }

        #context-menu { position: absolute; background: #0a0a0a; border: 1px solid #333; z-index: 1000; min-width: 120px; }
        .context-item { padding: 8px 12px; cursor: pointer; font-size: 0.8rem; }
        .context-item:hover { background: #1a1a1a; }
    </style>
</head>
<body>

    <div id="context-menu" class="hidden">
        <div class="context-item" onclick="executeDelete()">Delete</div>
    </div>

    <div id="auth-section">
        <div class="auth-box">
            <h1 class="logo">FLONTERS</h1>
            <p class="subtitle">The first music IOT</p>
            <div class="toggle-box">
                <button class="toggle-btn active" id="btn-login" onclick="switchForm('login')">LOGIN</button>
                <button class="toggle-btn" id="btn-signup" onclick="switchForm('signup')">SIGN UP</button>
            </div>
            <form id="form-login" onsubmit="processLogin(event)">
                <div class="input-group"><input type="email" id="log-email" placeholder="Email" required></div>
                <div class="input-group"><input type="password" id="log-pass" placeholder="Password" required></div>
                <div id="log-msg" class="error-msg"></div>
                <button type="submit" class="submit-btn">ENTER STAGE</button>
            </form>
            <form id="form-signup" class="hidden" onsubmit="processRegister(event)">
                <div class="input-group"><input type="text" id="reg-name" placeholder="Name" required></div>
                <div class="input-group"><input type="email" id="reg-email" placeholder="Email" required></div>
                <div class="input-group"><input type="password" id="reg-pass" placeholder="Password" required></div>
                <div id="reg-msg" class="error-msg"></div>
                <button type="submit" class="submit-btn">REGISTER</button>
            </form>
        </div>
    </div>

    <div id="dash-section">
        <div class="top-nav">
            <div class="nav-logo">FLONTERS</div>
            <div class="user-profile-container">
                <div class="nav-user" id="dashboard-username">Unknown</div>
                <div class="user-avatar" id="dashboard-avatar">?</div>
            </div>
        </div>

        <div class="workspace">
            <div class="panel-left">
                <div class="panel-header">Score Files</div>
                <button class="btn-new-score" id="btn-add-score" onclick="showNewFileInput()">+ New Score</button>
                <ul class="file-list" id="score-list"></ul>
            </div>
            
            <div class="panel-right">
                <div class="panel-editor-wrapper">
                    <div class="panel-header editor-header" id="editor-title">Composition</div>
                    <div class="panel-editor-content" id="editor-content-area">
                        <div class="placeholder-text">Select or create a score...</div>
                    </div>
                </div>
                
                <div class="iot-terminal">
                    <p>> IoT System Standby...</p>
                    <p class="log-success">> Audio Engine Loaded (Tone.js)</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= State & Global =================
        let currentUserEmail = null;
        let isCreatingFile = false; // [FIX 1] กันกดสร้างเพลงรัวๆ
        let activeFileLi = null;
        let activeFileName = "";
        let synth = null;

        // ================= Auth =================
        function switchForm(type) {
            document.getElementById('form-login').classList.toggle('hidden', type !== 'login');
            document.getElementById('form-signup').classList.toggle('hidden', type !== 'signup');
            document.getElementById('btn-login').classList.toggle('active', type === 'login');
            document.getElementById('btn-signup').classList.toggle('active', type === 'signup');
        }

        function processRegister(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value, email = document.getElementById('reg-email').value, pass = document.getElementById('reg-pass').value;
            let users = JSON.parse(localStorage.getItem('flonters_users')) || {};
            if (users[email]) return alert('Email exists!');
            users[email] = { name, password: pass, scores: [] };
            localStorage.setItem('flonters_users', JSON.stringify(users));
            alert('Registered!'); switchForm('login');
        }

        function processLogin(event) {
            event.preventDefault();
            const email = document.getElementById('log-email').value, pass = document.getElementById('log-pass').value;
            let users = JSON.parse(localStorage.getItem('flonters_users')) || {};
            if (users[email] && users[email].password === pass) {
                currentUserEmail = email;
                document.getElementById('dashboard-username').textContent = users[email].name;
                document.getElementById('dashboard-avatar').textContent = users[email].name.charAt(0);
                loadScores();
                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('dash-section').style.opacity = '1';
                document.getElementById('dash-section').style.pointerEvents = 'all';
            } else { alert('Wrong credentials!'); }
        }

        // ================= Score Management =================
        function loadScores() {
            const list = document.getElementById('score-list'); list.innerHTML = '';
            let users = JSON.parse(localStorage.getItem('flonters_users'));
            (users[currentUserEmail].scores || []).forEach(s => {
                const p = s.split('|'); renderScoreItem(p[0], p[1]);
            });
        }

        function showNewFileInput() {
            if (isCreatingFile) return; // [FIX 1] ถ้ากำลังสร้างอยู่ ไม่ให้กดซ้ำ
            
            isCreatingFile = true;
            document.getElementById('btn-add-score').disabled = true; // ปิดปุ่มไว้ก่อน

            const list = document.getElementById('score-list');
            const li = document.createElement('li');
            li.id = "temp-create-item";
            li.innerHTML = `
                <div class="new-file-group">
                    <input type="text" class="new-file-input" id="new-name" placeholder="Name...">
                    <input type="text" class="new-inst-input" id="new-inst" placeholder="Instrument...">
                </div>
            `;
            list.insertBefore(li, list.firstChild);
            document.getElementById('new-name').focus();

            // Logic การจบงานสร้าง
            let isProcessing = false; // [FIX 2] กัน Event Enter กับ Blur ตีกันแล้วงอก 2 อัน
            
            const finishAction = () => {
                if (isProcessing) return;
                isProcessing = true;

                const name = document.getElementById('new-name').value.trim();
                const inst = document.getElementById('new-inst').value.trim() || "Piano";

                if (name === "") {
                    li.remove();
                } else {
                    saveScore(name, inst);
                    renderScoreItem(name, inst, true);
                    li.remove();
                }
                isCreatingFile = false;
                document.getElementById('btn-add-score').disabled = false;
            };

            // กด Enter ในช่อง Instrument เพื่อเสร็จสิ้น
            document.getElementById('new-inst').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') finishAction();
            });

            // ถ้าคลิกข้างนอก (Blur) ก็ให้สร้างเหมือนกัน แต่ต้องเช็คไม่ให้รันซ้ำ
            document.getElementById('new-inst').addEventListener('blur', () => {
                setTimeout(finishAction, 100);
            });
        }

        function saveScore(name, inst) {
            let users = JSON.parse(localStorage.getItem('flonters_users'));
            users[currentUserEmail].scores.push(`${name}|${inst}`);
            localStorage.setItem('flonters_users', JSON.stringify(users));
        }

        function renderScoreItem(name, inst, isNew = false) {
            const list = document.getElementById('score-list');
            const li = document.createElement('li');
            li.innerHTML = `<span class="file-icon">></span><span class="file-name">${name}</span>`;
            
            li.ondblclick = () => openEditor(name, inst);
            li.oncontextmenu = (e) => {
                e.preventDefault(); activeFileName = name; activeFileLi = li;
                const menu = document.getElementById('context-menu');
                menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                menu.classList.remove('hidden');
            };

            if (isNew) {
                // ถ้าเป็นของใหม่ที่เพิ่งสร้าง ลบตัว temp ออกก่อน (กันเหนียว)
                const temp = document.getElementById('temp-create-item');
                if(temp) temp.remove();
                list.insertBefore(li, list.firstChild);
            } else {
                list.appendChild(li);
            }
        }

        function openEditor(name, inst) {
            document.getElementById('editor-title').textContent = `Composition - ${name}`;
            const area = document.getElementById('editor-content-area');
            area.innerHTML = `
                <div class="sheet-music-container">
                    <div class="sheet-title">${name}</div>
                    <div class="sheet-meta"><span>Inst: ${inst}</span><span>Composer: ${document.getElementById('dashboard-username').textContent}</span></div>
                    <div class="sheet-actions"><button class="action-btn" onclick="playPreview()">▶ PLAY AUDIO</button></div>
                    <div id="notation-canvas"></div>
                </div>
            `;
            renderVex(name);
        }

        function renderVex() {
            const { Renderer, Stave, StaveNote, Voice, Formatter } = Vex.Flow;
            const div = document.getElementById("notation-canvas");
            const renderer = new Renderer(div, Renderer.Backends.SVG);
            renderer.resize(600, 150);
            const context = renderer.getContext();
            const stave = new Stave(10, 20, 500);
            stave.addClef("treble").addTimeSignature("4/4");
            stave.setContext(context).draw();

            const notes = [
                new StaveNote({clef:"treble", keys:["c/4"], duration:"q"}),
                new StaveNote({clef:"treble", keys:["d/4"], duration:"q"}),
                new StaveNote({clef:"treble", keys:["e/4"], duration:"q"}),
                new StaveNote({clef:"treble", keys:["f/4"], duration:"q"})
            ];
            const voice = new Voice({num_beats:4, beat_value:4});
            voice.addTickables(notes);
            new Formatter().joinVoices([voice]).format([voice], 400);
            voice.draw(context, stave);
        }

        async function playPreview() {
            await Tone.start();
            if (!synth) synth = new Tone.PolySynth().toDestination();
            const now = Tone.now();
            synth.triggerAttackRelease("C4", "4n", now);
            synth.triggerAttackRelease("D4", "4n", now + 0.5);
            synth.triggerAttackRelease("E4", "4n", now + 1);
            synth.triggerAttackRelease("F4", "4n", now + 1.5);
        }

        function executeDelete() {
            if (confirm(`Delete ${activeFileName}?`)) {
                let users = JSON.parse(localStorage.getItem('flonters_users'));
                users[currentUserEmail].scores = users[currentUserEmail].scores.filter(s => !s.startsWith(activeFileName + "|"));
                localStorage.setItem('flonters_users', JSON.stringify(users));
                activeFileLi.remove();
                document.getElementById('context-menu').classList.add('hidden');
            }
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#context-menu')) document.getElementById('context-menu').classList.add('hidden');
        });

    </script>
</body>
</html>
