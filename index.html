<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Flonters IoT Monitoring</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .indicator { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #333; line-height: 80px; font-weight: bold; transition: 0.3s; color: #444; }
        /* สีตอนไฟติด */
        .red.on { background: #ff4d4d; box-shadow: 0 0 30px #ff4d4d; color: white; }
        .yellow.on { background: #ffeb3b; box-shadow: 0 0 30px #ffeb3b; color: black; }
        .green.on { background: #4caf50; box-shadow: 0 0 30px #4caf50; color: white; }
        .log { background: #222; padding: 15px; width: 80%; max-width: 400px; margin: 30px auto; border-radius: 10px; height: 150px; overflow-y: auto; text-align: left; }
    </style>
</head>
<body>
    <h1>Pico Status Monitor</h1>
    
    <div class="grid">
        <div id="ledRed" class="indicator red">RED</div>
        <div id="ledYellow" class="indicator yellow">YEL</div>
        <div id="ledGreen" class="indicator green">GRN</div>
    </div>

    <div class="log" id="logBox">กำลังรอข้อมูลจาก Pico...</div>

    <script>
        const dbURL = "https://flonters-default-rtdb.asia-southeast1.firebasedatabase.app/system_status.json";
        
        function updateUI() {
            fetch(dbURL)
            .then(res => res.json())
            .then(data => {
                if(!data) return;
                
                // อัปเดตไฟสีแดง
                document.getElementById('ledRed').classList.toggle('on', data.red === 1);
                // อัปเดตไฟสีเหลือง
                document.getElementById('ledYellow').classList.toggle('on', data.yellow === 1);
                // อัปเดตไฟสีเขียว
                document.getElementById('ledGreen').classList.toggle('on', data.green === 1);
                
                if(data.last_action) {
                    const logBox = document.getElementById('logBox');
                    logBox.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${data.last_action}</div>` + logBox.innerHTML;
                }
            });
        }

        // เช็คข้อมูลทุกๆ 1 วินาที
        setInterval(updateUI, 1000);
    </script>
</body>
</html>
