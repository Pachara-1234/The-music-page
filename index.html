<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Flonters Sheet Music Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-basic-min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.2.2/abcjs-audio.min.css">
    
    <style>
        body { 
            background: #1e1e1e; color: #f4f4f9; font-family: 'Segoe UI', Tahoma, sans-serif; 
            padding: 20px; margin: 0; 
        }
        h1 { text-align: center; color: #00ff88; }
        .container { display: flex; flex-direction: column; gap: 20px; max-width: 1000px; margin: 0 auto; }
        
        .editor-box { background: #2d2d2d; padding: 20px; border-radius: 10px; }
        textarea { 
            width: 100%; height: 180px; font-family: monospace; font-size: 18px; 
            background: #121212; color: #00ff88; border: 1px solid #444; 
            padding: 10px; border-radius: 5px; resize: vertical; box-sizing: border-box;
        }
        
        .result-box { background: white; padding: 20px; border-radius: 10px; color: black; overflow-x: auto; }
        .audio-box { background: #2d2d2d; padding: 20px; border-radius: 10px; text-align: center; }
        
        /* เปลี่ยนสีเครื่องเล่นเสียงนิดหน่อยให้เข้ากับธีมมืด */
        .abcjs-inline-audio { max-width: 100%; }
    </style>
</head>
<body>

    <h1>🎵 Flonters Sheet Music Editor</h1>
    
    <div class="container">
        <div class="editor-box">
            <h3>📝 พิมพ์โครงสร้างและโน้ตเพลงตรงนี้ (อัปเดตอัตโนมัติ)</h3>
            <textarea id="abc-source">
X: 1
T: เพลงแรกของ Flonters
M: 4/4
L: 1/4
Q: 1/4=120
K: C
% พิมพ์โน้ตบรรทัดล่างนี้ (C D E F G A B c)
C D E F | G A B c | c B A G | F E D C |]
            </textarea>
        </div>
        
        <div class="result-box">
            <div id="sheet-music"></div>
        </div>

        <div class="audio-box">
            <h3>▶️ ทดลองฟังเสียง</h3>
            <div id="audio-player"></div>
        </div>
    </div>

    <script>
        // ฟังก์ชันสำหรับวาดโน้ตและสร้างเสียง
        function renderMusic() {
            var abcString = document.getElementById("abc-source").value;
            
            // 1. วาดบรรทัด 5 เส้น
            var visualObj = ABCJS.renderAbc("sheet-music", abcString, { 
                responsive: "resize",
                add_classes: true 
            });
            
            // 2. โหลดเสียงเข้าเครื่องเล่น
            if (ABCJS.synth.supportsAudio()) {
                var synthControl = new ABCJS.synth.SynthController();
                synthControl.load("#audio-player", null, { 
                    displayLoop: true, 
                    displayRestart: true, 
                    displayPlay: true, 
                    displayProgress: true 
                });
                synthControl.setTune(visualObj[0], false);
            }
        }

        // วาดทันทีที่เปิดเว็บ
        renderMusic();

        // สั่งให้มันวาดใหม่ทุกครั้งที่อ้วนพิมพ์แก้ข้อความในกล่อง Textarea
        document.getElementById("abc-source").addEventListener("input", renderMusic);
    </script>
</body>
</html>
