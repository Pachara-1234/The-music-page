<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pico Chat Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        input, select, button { padding: 10px; margin: 10px; border-radius: 5px; border: none; width: 80%; max-width: 300px; }
        button { background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        .log { background: #222; padding: 10px; text-align: left; margin: 20px auto; max-width: 400px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Pico OLED Chat</h1>
    <select id="sender">
        <option value="P1">P1</option>
        <option value="P2">P2</option>
    </select><br>
    <input type="text" id="message" placeholder="พิมพ์ข้อความ..."><br>
    <button onclick="sendMsg()">ส่งไปที่จอ OLED</button>

    <div class="log" id="history">
        <small>ประวัติข้อความ:</small>
        <div id="lastSent">ไม่มีข้อมูล</div>
    </div>

    <script>
        const dbURL = "https://flonters-default-rtdb.asia-southeast1.firebasedatabase.app/chat.json";

        function sendMsg() {
            const sender = document.getElementById('sender').value;
            const msg = document.getElementById('message').value;
            const time = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
            
            const payload = {
                user: sender,
                text: msg,
                time: time,
                full: sender + ": " + msg
            };

            fetch(dbURL, { method: 'PUT', body: JSON.stringify(payload) })
            .then(() => {
                document.getElementById('lastSent').innerText = payload.full + " (" + time + ")";
                document.getElementById('message').value = "";
            });
        }
    </script>
</body>
</html>
